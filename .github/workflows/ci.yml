name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  check-and-test:
    name: check-all + test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: SKIP_MODEL_DOWNLOAD=1 pnpm install --frozen-lockfile

      - name: Generate test fixtures
        run: |
          FFMPEG="node_modules/node-av/binary/ffmpeg"
          # 1-second 440 Hz sine tone (WAV)
          "$FFMPEG" -y -f lavfi -i "sine=frequency=440:duration=1" testdata/tiny.wav
          # Same as MP3
          "$FFMPEG" -y -f lavfi -i "sine=frequency=440:duration=1" testdata/tiny.mp3
          # 5-second 320×240 colour-bars + sine audio (MP4)
          "$FFMPEG" -y \
            -f lavfi -i "testsrc=duration=5:size=320x240:rate=30" \
            -f lavfi -i "sine=frequency=440:duration=5" \
            -c:v libx264 -c:a aac \
            testdata/tiny.mp4

      - name: Run check-all (format + lint + typecheck)
        run: pnpm run check-all

      - name: Run tests (transcription skipped — no model in CI)
        run: SKIP_TRANSCRIPTION=1 pnpm test

  npm-package-smoke:
    name: npm package smoke install (macOS Node 24)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: SKIP_MODEL_DOWNLOAD=1 pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build

      - name: Pack npm tarball
        run: npm pack

      - name: Install tarball in fresh npm consumer
        run: |
          TARBALL="$(node -e "import { readdirSync } from 'node:fs'; const tarball = readdirSync('.').find((entry) => entry.endsWith('.tgz')); if (!tarball) throw new Error('npm pack did not produce a tarball'); process.stdout.write(tarball);")"
          CONSUMER_DIR="$(mktemp -d)"
          cp "$TARBALL" "$CONSUMER_DIR/"
          cd "$CONSUMER_DIR"
          npm init -y
          SKIP_MODEL_DOWNLOAD=1 npm install --foreground-scripts "./$TARBALL"
          node --input-type=module -e "await import('@dymoo/media-understanding'); console.log('ok');"

  docker-http-smoke:
    name: Docker HTTP smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build Docker image
        run: docker build -t media-understanding:ci .

      - name: Start Docker container
        run: |
          docker run -d \
            --name media-understanding-http \
            -p 8000:8000 \
            -v "$PWD/testdata:/media:ro" \
            media-understanding:ci

      - name: Run HTTP MCP smoke script
        env:
          MCP_SMOKE_MEDIA_PATH: /media/tiny.png
        run: node scripts/smoke-http-mcp.mjs

      - name: Dump container logs on failure
        if: failure()
        run: docker logs media-understanding-http

      - name: Stop Docker container
        if: always()
        run: docker rm -f media-understanding-http
