name: Release

on:
  release:
    types: [published]

jobs:
  verify-and-publish:
    name: Verify + publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Trusted publishing requires Node >= 22.14.0; use 24 for margin
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: SKIP_MODEL_DOWNLOAD=1 pnpm install --frozen-lockfile

      - name: Run check-all (format + lint + typecheck)
        run: pnpm run check-all

      - name: Run tests (transcription skipped — no model in CI)
        run: SKIP_TRANSCRIPTION=1 pnpm test

      - name: Build
        run: pnpm run build

      - name: Publish to npm (OIDC trusted publishing — no token required)
        run: npm publish --access public --ignore-scripts
        # --ignore-scripts skips prepublishOnly (check-all + build already ran above)
        # NODE_AUTH_TOKEN not needed — npm CLI auto-detects GitHub OIDC environment
