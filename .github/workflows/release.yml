name: Release Verification

on:
  release:
    types: [published]

jobs:
  verify-release:
    name: Verify release build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run check-all (format + lint + typecheck)
        run: pnpm run check-all

      - name: Run tests (transcription skipped — no model in CI)
        run: SKIP_TRANSCRIPTION=1 pnpm test

      - name: Build
        run: pnpm run build
