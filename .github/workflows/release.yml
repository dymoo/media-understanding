name: Release

on:
  release:
    types: [published]

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Trusted publishing requires Node >= 22.14.0; use 24 for margin
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: SKIP_MODEL_DOWNLOAD=1 pnpm install --frozen-lockfile

      - name: Run check-all (format + lint + typecheck)
        run: pnpm run check-all

      - name: Run tests (transcription skipped — no model in CI)
        run: SKIP_TRANSCRIPTION=1 pnpm test

      - name: Build
        run: pnpm run build

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write # Required for npm OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Trusted publishing requires Node >= 22.14.0; use 24 for margin
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: SKIP_MODEL_DOWNLOAD=1 pnpm install --frozen-lockfile

      - name: Publish to npm (OIDC trusted publishing — no token required)
        run: npm publish --access public --ignore-scripts
        # --ignore-scripts skips prepublishOnly (check-all + build already ran above)
        # NODE_AUTH_TOKEN not needed — npm CLI auto-detects GitHub OIDC environment

  publish-ghcr:
    name: Publish Docker image to GHCR
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
